<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Formulario de Compra</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-dark" style="background-color:green;">
        <div class="container">
            <a class="navbar-brand" href="index.html">StockY</a>
        </div>
    </nav>

    <!-- Formulario -->
    <div class="container mt-5">

        <div class="card shadow">
            <div class="card-body">

                <h2 class="mb-4">Formulario de Compra</h2>

                <form>

                    <div class="mb-3">
                        <label class="form-label">Nombre completo</label>
                        <input type="text" class="form-control" placeholder="Ingresa tu nombre">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Correo electrónico</label>
                        <input type="email" class="form-control" placeholder="ejemplo@email.com">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Dirección de entrega</label>
                        <textarea class="form-control" rows="3" placeholder="Ingresa tu dirección"></textarea>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Talla</label>
                        <select class="form-select">
                            <option>38/8</option>
                            <option>39/9</option>
                            <option>40/10</option>
                            <option>41/11</option>
                            <option>42/12</option>
                            <option>43/13</option>
                            <option>44/14</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Método de pago</label>
                        <select class="form-select">
                            <option>Tarjeta de crédito</option>
                            <option>Tarjeta de débito</option>
                            <option>PayPal</option>
                            <option>Transferencia bancaria</option>
                        </select>
                    </div>

                    <!-- Botón que abre el modal -->
                    <button
                        type="button"
                        class="btn btn-success"
                        data-bs-toggle="modal"
                        data-bs-target="#compraModal">
                        Confirmar Compra
                    </button>

                    <a href="index.html" class="btn btn-secondary">
                        Volver a la tienda
                    </a>

                </form>

            </div>
        </div>

    </div>

    <!-- Modal -->
    <div class="modal fade" id="compraModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">

                <div class="modal-header bg-success text-white">
                    <h5 class="modal-title">Compra Exitosa</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">
                    <h4>¡Gracias por comprar en StockY! 🎉</h4>
                    <p>
                        Tu pedido ha sido recibido correctamente.
                        Este es un formulario de demostración y no se realizará ningún cobro.
                    </p>
                </div>

                <div class="modal-footer">
                    <a href="index.html" class="btn btn-success">
                        Volver a la tienda
                    </a>
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                        Cerrar
                    </button>
                </div>

            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
