<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>StockY - Tienda de Zapatos</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark" style="background-color:green;">
        <div class="container">
            <a class="navbar-brand" href="#">StockY</a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="menu">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link active" href="#">Inicio</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Productos</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Contacto</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Título -->
    <div class="container mt-5">
        <h2 class="text-center mb-4">Productos populares</h2>

        <!-- Productos -->
        <div class="row g-4">

            <!-- Producto 1 -->
            <div class="col-md-4">
                <div class="card h-100">
                    <img src="https://images.stockx.com/images/Air-Jordan-1-OG-Chicago-1985-Product.jpg?fit=fill&bg=FFFFFF&w=700&h=500&fm=webp&auto=compress&q=90&dpr=2&trim=color&updated_at=1738193358" class="card-img-top" alt="Producto">
                    <div class="card-body">
                        <h5 class="card-title">Jordan 1 OG Chicago</h5>
                        <p class="card-text">
                            $120.00.
                        </p>
                        <a href="jordan1.html" class="btn btn-primary">Ver más</a>
                    </div>
                </div>
            </div>

            <!-- Producto 2 -->
            <div class="col-md-4">
                <div class="card h-100">
                    <img src="https://images.stockx.com/images/adidas-Superstar-White-Black-W-Product.jpg?fit=fill&bg=FFFFFF&w=700&h=500&fm=webp&auto=compress&q=90&dpr=2&trim=color&updated_at=1738193358" class="card-img-top" alt="Producto">
                    <div class="card-body">
                        <h5 class="card-title">Adidas Superstar</h5>
                        <p class="card-text">
                            $80.00.
                        </p>
                        <a href="superstar.html" class="btn btn-primary">Ver más</a>
                    </div>
                </div>
            </div>

            <!-- Producto 3 -->
            <div class="col-md-4">
                <div class="card h-100">
                    <img src="https://images.stockx.com/images/Nike-Air-Force-1-Low-White-07_V2-Product.jpg?fit=fill&bg=FFFFFF&w=700&h=500&fm=webp&auto=compress&q=90&dpr=2&trim=color&updated_at=1738193358" class="card-img-top" alt="Producto">
                    <div class="card-body">
                        <h5 class="card-title">Nike Air Force 1</h5>
                        <p class="card-text">
                            $90.00.
                        </p>
                        <a href="airforce1.html" class="btn btn-primary">Ver más</a>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
